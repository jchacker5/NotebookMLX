name: Code Signing & Notarization

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  sign-macos:
    name: Sign macOS Application
    runs-on: macos-latest
    if: github.event_name == 'release' || github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd notebook-mlx-app
          corepack enable
          pnpm install
      
      - name: Build frontend
        run: |
          cd notebook-mlx-app/frontend
          pnpm run build
      
      - name: Prepare Python distribution
        run: |
          cd notebook-mlx-app
          node scripts/prepare-python.js
      
      - name: Import Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      
      - name: Build and sign Electron app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
        run: |
          cd notebook-mlx-app
          pnpm run dist:mac
      
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd notebook-mlx-app
          # Find the .dmg file
          DMG_FILE=$(find dist -name "*.dmg" | head -1)
          if [ -n "$DMG_FILE" ]; then
            echo "Notarizing $DMG_FILE"
            xcrun notarytool submit "$DMG_FILE" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$DMG_FILE"
          fi
      
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-signed
          path: |
            notebook-mlx-app/dist/*.dmg
            notebook-mlx-app/dist/*.zip

  sign-windows:
    name: Sign Windows Application
    runs-on: windows-latest
    if: github.event_name == 'release' || github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd notebook-mlx-app
          corepack enable
          pnpm install
      
      - name: Build frontend
        run: |
          cd notebook-mlx-app/frontend
          pnpm run build
      
      - name: Prepare Python distribution
        run: |
          cd notebook-mlx-app
          node scripts/prepare-python.js
      
      - name: Build Electron app
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          cd notebook-mlx-app
          pnpm run dist:win
      
      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed
          path: |
            notebook-mlx-app/dist/*.exe
            notebook-mlx-app/dist/*.msi

  security-validation:
    name: Validate Signed Binaries
    runs-on: ubuntu-latest
    needs: [sign-macos, sign-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Validate macOS signatures
        run: |
          echo "## macOS Signature Validation" >> validation-report.md
          if [ -d "artifacts/macos-signed" ]; then
            for file in artifacts/macos-signed/*.dmg; do
              if [ -f "$file" ]; then
                echo "Validating $file" >> validation-report.md
                # Note: Full validation requires macOS, this is a placeholder
                echo "✅ $file found for validation" >> validation-report.md
              fi
            done
          fi
      
      - name: Validate Windows signatures
        run: |
          echo "## Windows Signature Validation" >> validation-report.md
          if [ -d "artifacts/windows-signed" ]; then
            for file in artifacts/windows-signed/*.exe; do
              if [ -f "$file" ]; then
                echo "Validating $file" >> validation-report.md
                echo "✅ $file found for validation" >> validation-report.md
              fi
            done
          fi
      
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: signature-validation
          path: validation-report.md

  release-to-github:
    name: Release Signed Binaries
    runs-on: ubuntu-latest
    needs: [security-validation]
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-signed/*
            artifacts/windows-signed/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}